name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Syntax check
        run: for f in server.mjs api/*.mjs lib/*.mjs data/*.mjs scripts/*.mjs; do node --check "$f"; done
      - name: Unit + core loop checks
        run: node scripts/check.mjs
      - name: REST smoke
        run: node scripts/smoke.mjs
      - name: MCP smoke
        run: node scripts/smoke-mcp.mjs
      - name: Persistence smoke
        run: node scripts/smoke-persistence.mjs
